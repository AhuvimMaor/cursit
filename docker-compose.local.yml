services:
  db:
    hostname: db
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: cursit
      POSTGRES_PASSWORD: cursit123
      POSTGRES_DB: cursit
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    ports:
      - 5432:5432
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U cursit']
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - 8000:8000
    environment:
      DATABASE_URL: postgresql://cursit:cursit123@db:5432/cursit?schema=public
      NODE_ENV: production
      PORT: 8000
    command: sh -c "npm run prisma:deploy --workspace=backend && npm start --workspace=backend"
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8000/api/health/ready']
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  pgdata:
