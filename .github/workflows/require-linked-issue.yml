name: Require Linked Issue

on:
  pull_request:
    types: [opened, edited, reopened, synchronize]

jobs:
  check-linked-issue:
    name: Linked Issue Check
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read

    steps:
      - name: Check PR body for issue link
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request.body || '';

            const issuePattern = /(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?|ref(?:erence[sd]?)?)?\s*#(\d+)/i;

            if (!issuePattern.test(body)) {
              core.setFailed(
                '❌ This PR must be linked to an issue.\n\n' +
                'Add a reference in the PR description, for example:\n' +
                '  Closes #123\n' +
                '  Fixes #45\n' +
                '  Related to #67\n\n' +
                'Current PR body does not contain any issue reference (#number).'
              );
            } else {
              const match = body.match(/(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?|ref(?:erence[sd]?)?)?\s*#(\d+)/gi);
              console.log(`✅ Found issue reference(s): ${match.join(', ')}`);
            }
